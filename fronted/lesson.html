<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson Player - EDOT Learning Platform</title>

  <!-- Meta Tags -->
  <meta name="description" content="Watch video lessons, take notes, and track your learning progress.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="Lesson">
  <!-- Skip to content -->
  <a href="#lesson-main" class="skip-link">Skip to main content</a>

  <!-- Simple Navigation -->
  <nav class="navbar" aria-label="Main navigation">
    <div class="container">
      <div class="nav-container">
        <a href="index.html" class="logo">EDOT</a>
        <div class="nav-buttons">
          <a href="dashboard.html" class="btn btn-outline">
            <i class="fas fa-arrow-left" aria-hidden="true"></i>
            Back to Dashboard
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Lesson Container -->
  <div class="lesson-container">
    <!-- Lesson Sidebar -->
    <aside class="lesson-sidebar" aria-label="Lesson navigation">
      <h3 id="courseTitle">Course Title</h3>

      <div class="course-progress" aria-label="Course progress">
        <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress-fill" id="courseProgress" style="width: 0%"></div>
        </div>
        <p><span id="completedLessons">0</span>/<span id="totalLessons">0</span> Lessons Completed</p>
      </div>

      <nav aria-label="Lesson list">
        <ul class="lesson-list" id="lessonList" role="list">
          <!-- Lessons will be loaded dynamically -->
          <li class="loading-skeleton" style="height: 50px;" aria-label="Loading lesson"></li>
          <li class="loading-skeleton" style="height: 50px;" aria-label="Loading lesson"></li>
          <li class="loading-skeleton" style="height: 50px;" aria-label="Loading lesson"></li>
        </ul>
      </nav>
    </aside>

    <!-- Lesson Main Content -->
    <main class="lesson-main" id="lesson-main">
      <!-- Video Player -->
      <div class="video-container" id="videoContainer">
        <video id="videoPlayer" controls preload="metadata" aria-label="Lesson video">
          <source src="" type="video/mp4">
          Your browser does not support the video tag.
        </video>

        <!-- Video Controls Overlay -->
        <div class="video-controls-overlay" id="videoControls">
          <button class="control-btn play-pause" onclick="togglePlayPause()" aria-label="Play/Pause">
            <i class="fas fa-play"></i>
          </button>
          <div class="progress-container">
            <input type="range" class="video-progress" min="0" max="100" value="0" step="0.1"
              aria-label="Video progress">
            <span class="time-display">00:00 / 00:00</span>
          </div>
          <div class="volume-container">
            <button class="control-btn volume" onclick="toggleMute()" aria-label="Mute/Unmute">
              <i class="fas fa-volume-up"></i>
            </button>
            <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="1" aria-label="Volume">
          </div>
          <button class="control-btn fullscreen" onclick="toggleFullscreen()" aria-label="Fullscreen">
            <i class="fas fa-expand"></i>
          </button>
        </div>
      </div>

      <!-- Lesson Info -->
      <article class="lesson-info">
        <h2 id="lessonTitle">Lesson Title</h2>
        <p id="lessonDescription">Lesson description will appear here.</p>

        <!-- Lesson Metadata -->
        <div class="lesson-metadata">
          <span class="duration"><i class="fas fa-clock"></i> <span id="lessonDuration">0</span> min</span>
          <span class="difficulty"><i class="fas fa-signal"></i> Intermediate</span>
        </div>
      </article>

      <!-- Lesson Navigation -->
      <div class="lesson-navigation" role="group" aria-label="Lesson navigation">
        <button class="btn btn-outline" id="prevLesson" onclick="navigateLesson('prev')" aria-label="Previous lesson">
          <i class="fas fa-arrow-left" aria-hidden="true"></i>
          Previous Lesson
        </button>

        <button class="btn btn-primary" id="markComplete" onclick="markLessonComplete()"
          aria-label="Mark lesson as complete">
          <i class="fas fa-check-circle" aria-hidden="true"></i>
          Mark as Completed
        </button>

        <button class="btn btn-outline" id="nextLesson" onclick="navigateLesson('next')" aria-label="Next lesson">
          Next Lesson
          <i class="fas fa-arrow-right" aria-hidden="true"></i>
        </button>
      </div>

      <!-- Lesson Notes -->
      <section class="lesson-notes" aria-labelledby="notes-title">
        <h3 id="notes-title">
          <i class="fas fa-sticky-note" aria-hidden="true"></i>
          Your Notes
        </h3>
        <textarea id="lessonNotes" placeholder="Take notes while watching the lesson..."
          aria-label="Lesson notes"></textarea>
        <div class="notes-actions">
          <button class="btn btn-primary btn-small" onclick="saveNotes()" aria-label="Save notes">
            <i class="fas fa-save" aria-hidden="true"></i>
            Save Notes
          </button>
          <button class="btn btn-outline btn-small" onclick="downloadNotes()" aria-label="Download notes">
            <i class="fas fa-download" aria-hidden="true"></i>
            Download
          </button>
        </div>
        <div class="last-saved" id="lastSaved">Last saved: Never</div>
      </section>

      <!-- Resources -->
      <section class="lesson-resources" aria-labelledby="
