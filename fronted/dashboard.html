<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - EDOT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-container">
        <a href="index.html" class="logo">EDOT</a>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="courses.html" class="nav-link">Courses</a></li>
          <li><a href="dashboard.html" class="nav-link active">Dashboard</a></li>
        </ul>
        <div class="nav-buttons" id="navButtons">
          <!-- Will be populated by JS -->
        </div>
        <button class="mobile-menu-btn">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Dashboard Container -->
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
      <div class="user-info">
        <img src="https://via.placeholder.com/100" alt="User Avatar" class="user-avatar" id="userAvatar">
        <h3 id="userName">Loading...</h3>
        <p id="userEmail">loading@email.com</p>
        <span class="badge" id="userRole">Student</span>
      </div>

      <ul class="dashboard-menu">
        <li>
          <a href="#" data-tab="overview" class="active">
            <i class="fas fa-home"></i> Overview
          </a>
        </li>
        <li>
          <a href="#" data-tab="my-courses">
            <i class="fas fa-book-open"></i> My Courses
          </a>
        </li>
        <li>
          <a href="#" data-tab="progress">
            <i class="fas fa-chart-line"></i> Progress
          </a>
        </li>
        <li>
          <a href="#" data-tab="wishlist">
            <i class="fas fa-heart"></i> Wishlist
          </a>
        </li>
        <li class="instructor-menu" style="display: none;">
          <a href="#" data-tab="instructor">
            <i class="fas fa-chalkboard-teacher"></i> Instructor
          </a>
        </li>
        <li>
          <a href="#" data-tab="settings">
            <i class="fas fa-cog"></i> Settings
          </a>
        </li>
        <li>
          <a href="#" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
          </a>
        </li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main" id="dashboardContent">
      <div class="loading-spinner"></div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>

</html>
