<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EDOT Learning Platform</title>

  <!-- Meta Tags -->
  <meta name="description" content="Log in to your EDOT account to continue your learning journey.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="Login">
  <!-- Skip to content -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Navigation -->
  <nav class="navbar" aria-label="Main navigation">
    <div class="container">
      <div class="nav-container">
        <a href="index.html" class="logo"><img class="home-logo" src="images/logo.png" alt="EDOT Logo"></a>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
          <i class="fas fa-bars"></i>
        </button>
        <ul class="nav-menu" id="navMenu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="courses.html" class="nav-link">Courses</a></li>
          <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
        <div class="nav-buttons">
          <a href="login.html" class="btn btn-outline active">Login</a>
          <a href="register.html" class="btn btn-primary">Sign Up</a>
        </div>
      </div>
    </div>
  </nav>

  <main id="main-content">
    <!-- Login Form -->
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Welcome Back!</h2>
          <p>Login to continue your learning journey</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
            <i class="fas fa-envelope input-icon" aria-hidden="true"></i>
            <div class="error-message" id="email-error" aria-live="polite"></div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required
              autocomplete="current-password">
            <i class="fas fa-lock input-icon" aria-hidden="true"></i>
            <button type="button" class="toggle-password" data-target="password"
              aria-label="Toggle password visibility">
              <i class="fas fa-eye" aria-hidden="true"></i>
            </button>
            <div class="error-message" id="password-error" aria-live="polite"></div>
          </div>

          <div class="form-group form-checkbox">
            <div>
              <input type="checkbox" id="remember">
              <label for="remember">Remember me</label>
            </div>
            <a href="#" id="forgotPassword" class="forgot-link">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-sign-in-alt" aria-hidden="true"></i>
            Login
          </button>

          <div class="form-footer">
            <p>Don't have an account? <a href="register.html">Sign up</a></p>
          </div>

          <div class="social-login">
            <p>Or login with</p>
            <div class="social-buttons">
              <button type="button" class="btn btn-outline social-btn" aria-label="Login with Google">
                <i class="fab fa-google"></i>
              </button>
              <button type="button" class="btn btn-outline social-btn" aria-label="Login with Facebook">
                <i class="fab fa-facebook-f"></i>
              </button>
              <button type="button" class="btn btn-outline social-btn" aria-label="Login with GitHub">
                <i class="fab fa-github"></i>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 EDOT. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
