<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EDOT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-container">
        <a href="index.html" class="logo">EDOT</a>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="courses.html" class="nav-link">Courses</a></li>
          <li><a href="login.html" class="nav-link active">Login</a></li>
          <li><a href="register.html" class="nav-link">Register</a></li>
        </ul>
        <button class="mobile-menu-btn">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back!</h2>
        <p>Login to continue your learning journey</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
          <i class="fas fa-envelope input-icon"></i>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
          <i class="fas fa-lock input-icon"></i>
          <button type="button" class="toggle-password" data-target="password">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <div class="form-group form-checkbox">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
          <a href="#" id="forgotPassword" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-sign-in-alt"></i>
          Login
        </button>
      </form>

      <div class="form-footer">
        <p>Don't have an account? <a href="register.html">Sign up</a></p>
      </div>

      <div class="social-login">
        <p>Or login with</p>
        <div class="social-buttons">
          <button class="btn btn-outline social-btn">
            <i class="fab fa-google"></i>
          </button>
          <button class="btn btn-outline social-btn">
            <i class="fab fa-facebook-f"></i>
          </button>
          <button class="btn btn-outline social-btn">
            <i class="fab fa-github"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 EDOT. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
