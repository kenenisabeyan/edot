<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - EDOT Learning Platform</title>

  <!-- Meta Tags -->
  <meta name="description"
    content="Your personal learning dashboard. Track your progress, manage courses, and continue learning.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="Dashboard">
  <!-- Skip to content -->
  <a href="#dashboard-main" class="skip-link">Skip to main content</a>

  <!-- Navigation -->
  <nav class="navbar" aria-label="Main navigation">
    <div class="container">
      <div class="nav-container">
        <a href="index.html" class="logo"><img class="home-logo" src="images/logo.png" alt="EDOT Logo"></a>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
          <i class="fas fa-bars"></i>
        </button>
        <ul class="nav-menu" id="navMenu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="courses.html" class="nav-link">Courses</a></li>
          <li><a href="dashboard.html" class="nav-link active">Dashboard</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
        <div class="nav-buttons" id="navButtons">
          <!-- Will be populated by JS -->
        </div>
      </div>
    </div>
  </nav>

  <!-- Dashboard Container -->
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar" aria-label="Dashboard navigation">
      <div class="user-info">
        <img src="https://via.placeholder.com/100" alt="User avatar" class="user-avatar" id="userAvatar">
        <h3 id="userName">Loading...</h3>
        <p id="userEmail">loading@email.com</p>
        <span class="badge" id="userRole">Student</span>
      </div>

      <nav aria-label="Dashboard menu">
        <ul class="dashboard-menu" role="list">
          <li role="listitem">
            <a href="#" data-tab="overview" class="active" aria-current="page">
              <i class="fas fa-home" aria-hidden="true"></i>
              <span>Overview</span>
            </a>
          </li>
          <li role="listitem">
            <a href="#" data-tab="my-courses">
              <i class="fas fa-book-open" aria-hidden="true"></i>
              <span>My Courses</span>
            </a>
          </li>
          <li role="listitem">
            <a href="#" data-tab="progress">
              <i class="fas fa-chart-line" aria-hidden="true"></i>
              <span>Progress</span>
            </a>
          </li>
          <li role="listitem">
            <a href="#" data-tab="wishlist">
              <i class="fas fa-heart" aria-hidden="true"></i>
              <span>Wishlist</span>
            </a>
          </li>
          <li role="listitem" class="instructor-menu" style="display: none;">
            <a href="#" data-tab="instructor">
              <i class="fas fa-chalkboard-teacher" aria-hidden="true"></i>
              <span>Instructor</span>
            </a>
          </li>
          <li role="listitem">
            <a href="#" data-tab="settings">
              <i class="fas fa-cog" aria-hidden="true"></i>
              <span>Settings</span>
            </a>
          </li>
          <li role="listitem">
            <a href="#" onclick="API.logout(); return false;">
              <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main" id="dashboard-main" aria-label="Dashboard content">
      <div class="loading-spinner" aria-label="Loading dashboard"></div>
    </main>
  </div>

  <!-- Notification Center -->
  <div class="notification-center" id="notificationCenter" aria-live="polite" aria-atomic="true">
    <!-- Notifications will appear here -->
  </div>

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>

</html>
