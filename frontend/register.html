<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EDOT Learning Platform</title>

    <!-- Meta Tags -->
    <meta name="description" content="Create your EDOT account and start learning today.">
    <meta name="robots" content="noindex, nofollow">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="Register">
    <!-- Skip to content -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Navigation -->
    <nav class="navbar" aria-label="Main navigation">
        <div class="container">
            <div class="nav-container">
                <a href="index.html" class="logo"><img class="home-logo" src="images/logo.jpg" alt="EDOT Logo"></a>
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
                    <i class="fas fa-bars"></i>
                </button>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="courses.html" class="nav-link">Courses</a></li>
                    <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                    <li><a href="about.html" class="nav-link">About</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                </ul>
                <div class="nav-buttons">
                    <a href="login.html" class="btn btn-outline">Login</a>
                    <a href="register.html" class="btn btn-primary active">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <main id="main-content">
        <!-- Registration Form -->
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Join EDOT and start learning today</p>
                </div>

                <form id="registerForm" novalidate>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required
                            autocomplete="name">
                        <i class="fas fa-user input-icon" aria-hidden="true"></i>
                        <div class="error-message" id="name-error" aria-live="polite"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required
                            autocomplete="email">
                        <i class="fas fa-envelope input-icon" aria-hidden="true"></i>
                        <div class="error-message" id="email-error" aria-live="polite"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Create a password" required
                            autocomplete="new-password">
                        <i class="fas fa-lock input-icon" aria-hidden="true"></i>
                        <button type="button" class="toggle-password" data-target="password"
                            aria-label="Toggle password visibility">
                            <i class="fas fa-eye" aria-hidden="true"></i>
                        </button>
                        <div class="error-message" id="password-error" aria-live="polite"></div>
                        <!-- Password strength meter (will be injected by JS) -->
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                            placeholder="Confirm your password" required autocomplete="new-password">
                        <i class="fas fa-lock input-icon" aria-hidden="true"></i>
                        <div class="error-message" id="confirmPassword-error" aria-live="polite"></div>
                    </div>

                    <div class="form-group">
                        <label for="role">I want to join as</label>
                        <select id="role" name="role">
                            <option value="student">Student</option>
                            <option value="instructor">Instructor</option>
                        </select>
                    </div>

                    <div class="form-group form-checkbox">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and
                            <a href="privacy.html" target="_blank">Privacy Policy</a></label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-user-plus" aria-hidden="true"></i>
                        Create Account
                    </button>

                    <div class="form-footer">
                        <p>Already have an account? <a href="login.html">Login</a></p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 EDOT. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
